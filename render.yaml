services:
  # ─── Django Backend ───────────────────────────────────────────────────────
  - type: web
    name: nexus-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: nexus_core.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexus-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://nexushackerplate-form.vercel.app,http://localhost:5173
      - key: PORT
        value: "8000"
      - key: DJANGO_SUPERUSER_USERNAME
        value: nexus_admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@nexus-platform.io
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    healthCheckPath: /api/health/
    autoDeploy: true

  # ─── Redis (cache + channels) ──────────────────────────────────────────────
  - type: redis
    name: nexus-redis
    plan: free
    ipAllowList: []

databases:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  - name: nexus-db
    plan: free
    databaseName: nexus_db
    user: nexus
